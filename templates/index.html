<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Carte Cédric</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script>
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    }
    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', setAppHeight);
    setAppHeight();
  </script>

  <style>
    :root {
      --sidebar-width: 30%;
      --map-width: 70%;
      --sidebar-h: 38vh;
      --map-h: 62vh;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --bg: #f8f9fb;
      --surface: #ffffff;
      --border: #e4e7ec;
      --text: #111827;
      --muted: #6b7280;
      --tab-bg: #f1f3f7;
      --tab-active-bg: #ffffff;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: var(--app-height);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    body {
      display: flex;
      flex-direction: row;
      height: var(--app-height);
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--tab-bg);
      border-bottom: 1px solid var(--border);
      padding: 6px 6px 0;
      gap: 2px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      cursor: pointer;
      user-select: none;
      border-radius: 8px 8px 0 0;
      font-weight: 500;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: background 0.15s, color 0.15s;
    }
    .tab.active {
      background: var(--tab-active-bg);
      color: var(--accent);
      box-shadow: 0 -1px 0 0 var(--accent) inset;
    }
    .tab:hover:not(.active) {
      background: rgba(255,255,255,0.6);
      color: var(--text);
    }

    /* ── Tab contents ── */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: none;
    }
    .tab-content.active { display: block; }

    /* ── Refresh button ── */
    #refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(59,130,246,0.3);
    }
    #refresh-btn:hover { background: var(--accent-hover); }
    #refresh-btn:active { transform: scale(0.98); }
    #refresh-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Info section ── */
    .info-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-top: 12px;
    }
    .info-card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .info-card .value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    #last-update {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #last-update::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    /* ── Trajets list ── */
    #trajets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #trajets li {
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }
    #trajets li:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
      background: #f0f5ff;
    }
    #trajets li .trip-date {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 2px;
    }
    #trajets li .trip-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Photos ── */
    #photos-list .photo-entry {
      margin-bottom: 14px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    #photos-list img {
      width: 100%;
      height: auto;
      display: block;
    }
    #photos-list .photo-meta {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Map ── */
    #map {
      width: var(--map-width);
      height: var(--app-height);
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { flex-direction: column; }

      #sidebar {
        width: 100%;
        height: var(--sidebar-h);
        border-right: none;
        border-bottom: 1px solid var(--border);
        transition: height 0.3s ease;
      }

      /* Agrandir la sidebar quand l'onglet photos est actif */
      body.photos-active #sidebar {
        height: 65vh;
      }
      body.photos-active #map {
        height: 35vh;
      }

      #map {
        width: 100%;
        height: var(--map-h);
        flex-shrink: 0;
        transition: height 0.3s ease;
      }

      .tab-content {
        padding: 12px;
      }
    }

    /* Scrollbar subtil */
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Popup leaflet */
    .leaflet-popup-content img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    .leaflet-popup-content { max-width: 250px; overflow-wrap: break-word; font-family: 'Inter', sans-serif; font-size: 13px; }
  </style>
</head>
<body>

  <div id="sidebar">
    <div class="tabs">
      <div class="tab active" data-tab="info">Informations</div>
      <div class="tab" data-tab="trace">Trajets</div>
      <div class="tab" data-tab="photos">Photos</div>
    </div>

    <!-- Onglet Info -->
    <div class="tab-content active" id="info">
      <button id="refresh-btn" onclick="refreshLivePosition()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 2.5A7 7 0 1 0 14.5 9"/>
          <polyline points="14.5 2.5 14.5 6 11 6"/>
        </svg>
        Actualiser la position
      </button>
      <div id="last-update" style="display:none">Chargement...</div>
      <div class="info-card" style="margin-top:12px">
        <div class="label">Position actuelle</div>
        <div class="value" id="current-location">En cours de chargement…</div>
      </div>
    </div>

    <!-- Onglet Trajets -->
    <div class="tab-content" id="trace">
      <div class="section-title">Trajets récents — cliquez pour afficher</div>
      <ul id="trajets"></ul>
      <!-- Champs cachés conservés pour la logique JS -->
      <input type="date" id="dateStart" hidden />
      <input type="date" id="dateEnd" hidden />
      <button id="btnShowTrace" hidden>Afficher</button>
    </div>

    <!-- Onglet Photos -->
    <div class="tab-content" id="photos">
      <div class="section-title">Photos</div>
      <div id="photos-list">Chargement des photos…</div>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OverlappingMarkerSpiderfier-Leaflet/0.2.6/oms.min.js"></script>

  <script>
    // ── Onglets ──────────────────────────────────────────────────────────────
    const tabs = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        tabContents.forEach(tc => tc.classList.remove('active'));
        const target = tab.getAttribute('data-tab');
        document.getElementById(target).classList.add('active');

        // Responsive : agrandir sidebar si onglet photos actif
        const isPhotos = target === 'photos';
        document.body.classList.toggle('photos-active', isPhotos);

        if (isPhotos) loadPhotosList();
      });
    });

    // ── Carte ────────────────────────────────────────────────────────────────
    const map = L.map('map').setView([46.5, 2], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const oms = new OverlappingMarkerSpiderfier(map, { keepSpiderfied: true, nearbyDistance: 20 });

    let traceLayer = null;
    let pointMarkers = [];
    let photoMarkers = [];

    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString("fr-FR", {
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function clearMapLayers() {
      if (traceLayer) { map.removeLayer(traceLayer); traceLayer = null; }
      pointMarkers.forEach(m => map.removeLayer(m));
      pointMarkers = [];
    }

    function showTrace(data) {
      clearMapLayers();
      const filteredData = data.filter(p => p.lat !== null && p.lon !== null && !isNaN(p.lat) && !isNaN(p.lon));
      if (filteredData.length < 2) { alert('Pas assez de points valides pour tracer la route.'); return; }
      const latlngs = filteredData.map(p => [p.lat, p.lon]);
      traceLayer = L.polyline(latlngs, { color: '#3b82f6', weight: 3, opacity: 0.8 }).addTo(map);
      map.fitBounds(traceLayer.getBounds());
      filteredData.forEach(p => {
        const marker = L.circleMarker([p.lat, p.lon], {
          radius: 4, color: '#1d4ed8', fillColor: '#3b82f6', fillOpacity: 0.6, weight: 1.5
        }).addTo(map);
        marker.bindPopup(`<b>Point GPS</b><br>${formatDate(p.timestamp)}`);
        pointMarkers.push(marker);
      });
    }

    document.getElementById('btnShowTrace').addEventListener('click', () => {
      const dateStart = document.getElementById('dateStart').value;
      const dateEnd = document.getElementById('dateEnd').value;
      if (!dateStart || !dateEnd) { alert('Merci de sélectionner les deux dates'); return; }
      const startISO = new Date(dateStart + 'T00:00:00').toISOString();
      const endISO = new Date(dateEnd + 'T23:59:59').toISOString();
      fetch(`/api/position/history?start=${startISO}&end=${endISO}`)
        .then(res => res.json())
        .then(showTrace)
        .catch(err => { console.error('Erreur récupération trace :', err); alert('Erreur lors de la récupération de l\'historique'); });
    });

    let distancesParJour = {};

    function loadTrajetsList() {
      const dateStart = document.getElementById('dateStart').value;
      const dateEnd = document.getElementById('dateEnd').value;
      const startISO = new Date(dateStart + 'T00:00:00').toISOString();
      const endISO = new Date(dateEnd + 'T23:59:59').toISOString();
      fetch(`/api/position/history?start=${startISO}&end=${endISO}`)
        .then(res => res.json())
        .then(data => {
          const trajetsEl = document.getElementById('trajets');
          trajetsEl.innerHTML = '';
          if (data.length === 0) {
            trajetsEl.innerHTML = '<li style="color:var(--muted);border:none;background:none;cursor:default">Aucun trajet trouvé.</li>';
            return;
          }
          const trajetsParJour = {};
          data.forEach(p => {
            const jour = new Date(p.timestamp).toISOString().slice(0, 10);
            if (!trajetsParJour[jour]) trajetsParJour[jour] = [];
            trajetsParJour[jour].push(p);
          });

          // ── Trier du plus récent au plus ancien ──────────────────────────
          const joursTriés = Object.keys(trajetsParJour).sort((a, b) => b.localeCompare(a));

          joursTriés.forEach(jour => {
            const points = trajetsParJour[jour];
            const distanceKm = distancesParJour[jour] ?? 0;
            points.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const startTime = new Date(points[0].timestamp);
            const endTime = new Date(points[points.length - 1].timestamp);
            const durationMs = endTime - startTime;
            const durationMinutes = Math.floor(durationMs / 60000);
            const heures = Math.floor(durationMinutes / 60);
            const minutes = durationMinutes % 60;
            const formattedDuration = `${heures}h${minutes.toString().padStart(2, '0')}`;

            // Formatage lisible de la date
            const dateObj = new Date(jour + 'T12:00:00');
            const dateLabel = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

            const li = document.createElement('li');
            li.innerHTML = `
              <div class="trip-date">${dateLabel}</div>
              <div class="trip-meta">${distanceKm.toFixed(2)} km · ${formattedDuration}</div>
            `;
            li.onclick = () => showTrace(points);
            trajetsEl.appendChild(li);
          });
        })
        .catch(err => console.error('Erreur récupération trajets:', err));
    }

    document.getElementById('dateStart').addEventListener('change', loadTrajetsList);
    document.getElementById('dateEnd').addEventListener('change', loadTrajetsList);

    // On charge une large fenêtre temporelle par défaut (30 derniers jours)
    const today = new Date().toISOString().slice(0, 10);
    const monthAgo = new Date(Date.now() - 30 * 24 * 3600 * 1000).toISOString().slice(0, 10);
    document.getElementById('dateStart').value = monthAgo;
    document.getElementById('dateEnd').value = today;

    fetch('/api/distances')
      .then(res => res.json())
      .then(data => {
        distancesParJour = {};
        data.forEach(entry => { distancesParJour[entry.jour] = entry.distance_km; });
        loadTrajetsList();
      })
      .catch(err => {
        console.error('Erreur récupération distances :', err);
        loadTrajetsList();
      });

    // ── Photos ───────────────────────────────────────────────────────────────
    function loadPhotosList() {
      fetch('/api/photos')
        .then(res => res.json())
        .then(data => {
          const photosContainer = document.getElementById('photos-list');
          photosContainer.innerHTML = '';
          if (!data.length) { photosContainer.innerHTML = '<p style="color:var(--muted)">Aucune photo disponible.</p>'; return; }
          data.reverse();
          data.forEach(photo => {
            const date = new Date(photo.timestamp);
            const formattedDate = date.toLocaleString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.classList.add('photo-entry');
            div.innerHTML = `
              <img src="/static/photos/${photo.filename}" alt="Photo prise le ${formattedDate}" loading="lazy">
              <div class="photo-meta">${formattedDate}</div>
            `;
            photosContainer.appendChild(div);
          });
        })
        .catch(err => {
          console.error('Erreur chargement photos:', err);
          document.getElementById('photos-list').innerHTML = '<p style="color:var(--muted)">Erreur lors du chargement.</p>';
        });
    }

    // ── Géocodage inverse ─────────────────────────────────────────────────────
    function reverseGeocode(lat, lon) {
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`)
        .then(response => response.json())
        .then(data => {
          const address = data.address;
          const commune = address.town || address.village || address.city || address.municipality || 'Inconnue';
          const codePostal = address.postcode || '';
          document.getElementById('current-location').textContent = codePostal ? `${commune} (${codePostal})` : commune;
        })
        .catch(() => {
          document.getElementById('current-location').textContent = 'Erreur de géocodage';
        });
    }

    // ── Position en direct ────────────────────────────────────────────────────
    function refreshLivePosition() {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.style.opacity = '0.7';

      fetch('/api/position')
        .then(res => res.json())
        .then(pos => {
          if (pos.lat && pos.lon) {
            map.setView([pos.lat, pos.lon], 13);
            L.circleMarker([pos.lat, pos.lon], {
              radius: 10, color: '#ef4444', fillColor: '#f87171', fillOpacity: 0.7, weight: 2
            }).addTo(map).bindPopup('<b>Position en direct</b>').openPopup();
            reverseGeocode(pos.lat, pos.lon);
            const formatted = formatDate(pos.timestamp);
            const el = document.getElementById('last-update');
            el.textContent = `Dernière mise à jour : ${formatted}`;
            el.style.display = 'flex';
          }
        })
        .catch(err => console.error('Erreur actualisation position :', err))
        .finally(() => {
          btn.disabled = false;
          btn.style.opacity = '1';
        });
    }

    // ── Marqueurs photos sur la carte ─────────────────────────────────────────
    function afficherPhotosSurCarte(photos) {
      photoMarkers.forEach(m => { oms.removeMarker(m); map.removeLayer(m); });
      photoMarkers = [];
      photos.forEach(photo => {
        if (photo.lat && photo.lon) {
          const marker = L.marker([photo.lat, photo.lon]);
          const dateStr = new Date(photo.timestamp).toLocaleString('fr-FR');
          marker.bindPopup(`
            <div style="text-align:center;">
              <img src="/static/photos/${photo.filename}" style="max-width:200px;border-radius:8px;" /><br>
              <small style="color:#6b7280">${dateStr}</small>
            </div>
          `);
          marker.addTo(map);
          oms.addMarker(marker);
          photoMarkers.push(marker);
        }
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    refreshLivePosition();

    fetch('/api/photos')
      .then(res => res.json())
      .then(photos => {
        loadPhotosList();
        afficherPhotosSurCarte(photos);
      })
      .catch(err => console.error('Erreur chargement photos:', err));

    fetch('/log_visit').catch(err => console.warn('Erreur de tracking :', err));
  </script>
</body>
</html>
